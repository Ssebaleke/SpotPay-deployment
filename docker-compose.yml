services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  web:
    build: .
    env_file:
      - .env
    depends_on:
      - redis
    command: >
      sh -c "
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      gunicorn Billing.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      --timeout 120
      --access-logfile -
      --error-logfile -
      --log-level debug
      "
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    restart: unless-stopped

  scheduler:
    build: .
    env_file:
      - .env
    command: >
      sh -c "
      touch /var/log/cron.log &&
      echo '0 6 * * * root cd /app && python manage.py enforce_subscriptions >> /var/log/cron.log 2>&1' > /etc/cron.d/spotpay &&
      echo '*/2 * * * * root cd /app && python manage.py verify_kwa_payments >> /var/log/cron.log 2>&1' >> /etc/cron.d/spotpay &&
      echo '*/5 * * * * root cd /app && python manage.py fix_missing_vouchers >> /var/log/cron.log 2>&1' >> /etc/cron.d/spotpay &&
      echo '*/5 * * * * root cd /app && python manage.py retry_voucher_sms >> /var/log/cron.log 2>&1' >> /etc/cron.d/spotpay &&
      chmod 0644 /etc/cron.d/spotpay &&
      cron && tail -f /var/log/cron.log
      "
    restart: unless-stopped
    depends_on:
      - web

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./media:/app/media:ro
      - ./staticfiles:/app/staticfiles:ro
      - ./ssl:/etc/nginx/ssl:ro
    restart: unless-stopped