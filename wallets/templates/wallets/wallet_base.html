<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SpotPay Wallet{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: #f5f7fb;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #212529;
        }

        /* Top bar */
        .wallet-topbar {
            background: #0c1218;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .wallet-topbar .brand {
            display: flex; align-items: center; gap: 10px;
        }
        .wallet-topbar .brand-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: #fff;
        }
        .wallet-topbar .brand-name {
            font-size: 1rem; font-weight: 700; color: #f1f5f9;
        }
        .wallet-topbar .brand-sub {
            font-size: 0.7rem; color: #64748b; margin-top: -2px;
        }
        .wallet-topbar .secure-badge {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.75rem; color: #22c55e;
            background: rgba(34,197,94,0.12);
            border: 1px solid rgba(34,197,94,0.25);
            padding: 4px 10px; border-radius: 20px;
        }
        .back-link {
            color: #94a3b8; font-size: 0.8rem; text-decoration: none;
            display: flex; align-items: center; gap: 5px;
        }
        .back-link:hover { color: #f1f5f9; }

        /* Main content */
        .wallet-body {
            min-height: calc(100vh - 65px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 16px;
        }

        .wallet-card {
            background: #ffffff;
            border: 1px solid #e9ecef;
            border-radius: 16px;
            padding: 36px 32px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.07);
        }

        /* Form controls */
        .form-label { color: #495057; font-size: 0.82rem; font-weight: 500; margin-bottom: 6px; }
        .form-control, .form-select {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            color: #212529;
            border-radius: 10px;
            padding: 11px 14px;
            font-size: 0.9rem;
        }
        .form-control:focus, .form-select:focus {
            background: #fff;
            border-color: #4361ee;
            color: #212529;
            box-shadow: 0 0 0 3px rgba(67,97,238,0.15);
        }
        .form-control::placeholder { color: #adb5bd; }
        .input-group-text {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            color: #6c757d;
            border-radius: 10px 0 0 10px;
        }
        .input-group .form-control,
        .input-group .form-select { border-radius: 0 10px 10px 0; border-left: none; }
        .input-group:focus-within .input-group-text { border-color: #4361ee; }
        .form-text { color: #6c757d; font-size: 0.75rem; }

        /* Buttons */
        .btn-wallet-primary {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            border: none; color: #fff;
            border-radius: 10px; padding: 12px;
            font-size: 0.92rem; font-weight: 600;
            width: 100%; transition: opacity .2s;
        }
        .btn-wallet-primary:hover { opacity: 0.88; color: #fff; }
        .btn-wallet-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-wallet-success {
            background: linear-gradient(135deg, #22c55e, #15803d);
            border: none; color: #fff;
            border-radius: 10px; padding: 12px;
            font-size: 0.92rem; font-weight: 600;
            transition: opacity .2s;
        }
        .btn-wallet-success:hover { opacity: 0.88; color: #fff; }
        .btn-wallet-success:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-wallet-outline {
            background: transparent;
            border: 1px solid #dee2e6;
            color: #6c757d;
            border-radius: 10px; padding: 11px;
            font-size: 0.88rem; font-weight: 500;
            transition: all .2s;
        }
        .btn-wallet-outline:hover { border-color: #4361ee; color: #4361ee; }

        /* Alerts */
        .alert { border-radius: 10px; font-size: 0.84rem; }
        .alert-danger { background: #fff5f5; border-color: #fecaca; color: #dc2626; }
        .alert-success { background: #f0fdf4; border-color: #bbf7d0; color: #16a34a; }
        .alert-info { background: #eff6ff; border-color: #bfdbfe; color: #2563eb; }
        .alert-warning { background: #fffbeb; border-color: #fde68a; color: #d97706; }

        /* Divider */
        .wallet-divider { border-color: #e9ecef; margin: 20px 0; }

        /* Footer */
        .wallet-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.75rem;
            color: #adb5bd;
        }
        .wallet-footer a { color: #4361ee; text-decoration: none; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

<!-- Top Bar -->
<div class="wallet-topbar">
    <div class="brand">
        <div class="brand-icon"><i class="bi bi-shield-lock"></i></div>
        <div>
            <div class="brand-name">SpotPay Wallet</div>
            <div class="brand-sub">Secure Financial Portal</div>
        </div>
    </div>
    <div class="d-flex align-items-center gap-3">
        <div class="secure-badge">
            <i class="bi bi-lock-fill"></i> 256-bit Encrypted
        </div>
        <a href="{% url 'vendor_dashboard' %}" class="back-link">
            <i class="bi bi-arrow-left"></i> Dashboard
        </a>
    </div>
</div>

<!-- Body -->
<div class="wallet-body">
    <div class="wallet-card">
        {% block wallet_content %}{% endblock %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
