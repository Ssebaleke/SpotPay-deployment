<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw | SpotPay</title>
    <style>
        :root {
            --bg-primary: #f4f6f8;
            --bg-secondary: #ffffff;
            --text-primary: #000000;
            --text-secondary: #6c757d;
            --border-color: #ced4da;
            --border-light: #dee2e6;
        }
        
        [data-theme="dark"] {
            --bg-primary: #0f1419;
            --bg-secondary: #1a1f2e;
            --text-primary: #e8eaed;
            --text-secondary: #9ca3af;
            --border-color: #2d3748;
            --border-light: #374151;
        }
        
        body { 
            font-family: system-ui, -apple-system, BlinkMacSystemFont; 
            background: var(--bg-primary); 
            color: var(--text-primary);
            margin: 0; 
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }
        
        .card { 
            max-width: 620px; 
            margin: 0 auto; 
            background: var(--bg-secondary); 
            border-radius: 12px; 
            padding: 22px; 
            box-shadow: 0 6px 16px rgba(0,0,0,.08); 
        }
        
        .muted { color: var(--text-secondary); }
        .row { margin-bottom: 14px; }
        
        label {
            color: var(--text-primary);
            font-weight: 500;
        }
        
        input[type="number"] { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        
        input[type="number"]:focus {
            outline: none;
            border-color: #198754;
        }
        
        .actions { display: flex; gap: 10px; margin-top: 18px; }
        
        .btn { 
            border: none; 
            border-radius: 8px; 
            padding: 10px 14px; 
            text-decoration: none; 
            cursor: pointer; 
            font-weight: 600;
            transition: opacity 0.2s;
        }
        
        .btn:hover {
            opacity: 0.9;
        }
        
        .btn-primary { background: #198754; color: #fff; }
        .btn-secondary { 
            background: var(--border-light); 
            color: var(--text-primary); 
        }
        
        .alert { 
            padding: 10px 12px; 
            border-radius: 8px; 
            margin-bottom: 12px; 
        }
        
        .alert-danger { background: #f8d7da; color: #842029; }
        .alert-success { background: #d1e7dd; color: #0f5132; }
        .alert-info { background: #cff4fc; color: #055160; }
        
        [data-theme="dark"] .alert-danger { background: rgba(220, 53, 69, 0.15); color: #f87171; }
        [data-theme="dark"] .alert-success { background: rgba(25, 135, 84, 0.15); color: #4ade80; }
        [data-theme="dark"] .alert-info { background: rgba(13, 202, 240, 0.15); color: #38bdf8; }
    </style>
</head>
<body>

<script>
// Theme sync with main app
const savedTheme = localStorage.getItem('theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);
</script>
    <div class="card">
        <h2>Withdraw Funds</h2>
        <p class="muted">Available balance: <strong>UGX {{ wallet.balance }}</strong></p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert {% if 'error' in message.tags %}alert-danger{% elif 'success' in message.tags %}alert-success{% else %}alert-info{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="row">
                <label for="amount">Amount (UGX)</label>
                <input id="amount" name="amount" type="number" min="1" step="0.01" required>
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-primary">Continue</button>
                <a href="{% url 'wallet_dashboard' %}" class="btn btn-secondary">Back</a>
            </div>
        </form>
    </div>
</body>
</html>
