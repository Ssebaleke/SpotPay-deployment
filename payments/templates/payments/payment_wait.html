<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta http-equiv="pragma" content="no-cache" />
    <title>Processing Payment — SpotPay</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .card {
            width: 100%;
            max-width: 360px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 36px 28px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        /* Spinner */
        .spinner-wrap {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            position: relative;
        }
        .spinner {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid #1e3a8a;
            border-top-color: #3b82f6;
            animation: spin 0.9s linear infinite;
        }
        .spinner-icon {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Success ring */
        .success-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid #10b981;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 24px;
            animation: popIn 0.4s ease;
        }
        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        /* Failed ring */
        .failed-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid #ef4444;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 24px;
            animation: popIn 0.4s ease;
        }

        .title {
            font-size: 18px;
            font-weight: 800;
            color: #f1f5f9;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .status-box {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 20px;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .status-text {
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
        }
        .status-text.success { color: #10b981; }
        .status-text.failed  { color: #ef4444; }

        .dots span {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #3b82f6;
            margin: 0 2px;
            animation: bounce 1.2s infinite ease-in-out;
        }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40%            { transform: scale(1.0); opacity: 1.0; }
        }

        .timer {
            font-size: 11px;
            color: #475569;
            margin-bottom: 20px;
        }

        .voucher-box {
            display: none;
            background: #0f172a;
            border: 1px solid #10b981;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 16px;
        }
        .voucher-label {
            font-size: 11px;
            color: #64748b;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: .05em;
        }
        .voucher-code {
            font-size: 26px;
            font-weight: 900;
            color: #f1f5f9;
            letter-spacing: 3px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 13px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            margin-bottom: 8px;
        }
        .btn-connect {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            display: none;
            box-shadow: 0 4px 14px rgba(16,185,129,0.4);
        }
        .btn-retry {
            background: transparent;
            border: 1px solid #334155;
            color: #64748b;
            display: none;
        }

        .powered {
            margin-top: 24px;
            font-size: 11px;
            color: #1e293b;
        }
    </style>
</head>
<body>

<div class="card">

    <!-- Spinner (default) -->
    <div class="spinner-wrap" id="spinner-wrap">
        <div class="spinner"></div>
        <div class="spinner-icon">📶</div>
    </div>

    <!-- Success ring -->
    <div class="success-ring" id="success-ring">✅</div>

    <!-- Failed ring -->
    <div class="failed-ring" id="failed-ring">❌</div>

    <div class="title" id="title">Processing Payment</div>
    <div class="subtitle" id="subtitle">Please wait while we confirm your payment.<br>Do not close this page.</div>

    <div class="status-box">
        <div class="dots" id="dots">
            <span></span><span></span><span></span>
        </div>
        <div class="status-text" id="status-text">Waiting for confirmation...</div>
    </div>

    <div class="timer" id="timer"></div>

    <!-- Voucher code (shown as fallback) -->
    <div class="voucher-box" id="voucher-box">
        <div class="voucher-label">Your Voucher Code</div>
        <div class="voucher-code" id="voucher-code"></div>
    </div>

    <a class="btn btn-connect" id="btn-connect" href="#">🔗 Tap to Connect</a>
    <button class="btn btn-retry" id="btn-retry" onclick="window.location.href='http://'+(window.HOTSPOT_DNS||'hot.spot')+'/'">← Try Again</button>

</div>

<div class="powered">Powered by SpotPay</div>

<script>
    var STATUS_URL   = 'http://spotpay.it.com/payments/status/{{ reference }}/';
    var HOTSPOT_DNS  = '{{ hotspot_dns }}';
    var POLL_INTERVAL = 2500;
    var MAX_SECONDS   = 120;

    var seconds  = 0;
    var pollTimer = null;
    var timerInterval = null;
    var done = false;

    var elSpinnerWrap = document.getElementById('spinner-wrap');
    var elSuccessRing = document.getElementById('success-ring');
    var elFailedRing  = document.getElementById('failed-ring');
    var elTitle       = document.getElementById('title');
    var elSubtitle    = document.getElementById('subtitle');
    var elDots        = document.getElementById('dots');
    var elStatusText  = document.getElementById('status-text');
    var elTimer       = document.getElementById('timer');
    var elVoucherBox  = document.getElementById('voucher-box');
    var elVoucherCode = document.getElementById('voucher-code');
    var elBtnConnect  = document.getElementById('btn-connect');
    var elBtnRetry    = document.getElementById('btn-retry');

    // Timer
    timerInterval = setInterval(function () {
        if (done) return;
        seconds++;
        elTimer.textContent = seconds + 's';
        if (seconds >= MAX_SECONDS) {
            clearInterval(timerInterval);
            clearTimeout(pollTimer);
            showTimeout();
        }
    }, 1000);

    function showSuccess(voucher, dns) {
        done = true;
        clearInterval(timerInterval);
        clearTimeout(pollTimer);

        elSpinnerWrap.style.display = 'none';
        elSuccessRing.style.display = 'flex';
        elDots.style.display = 'none';
        elTitle.textContent = 'Payment Successful!';
        elSubtitle.textContent = 'Connecting you to the internet...';
        elStatusText.className = 'status-text success';
        elStatusText.textContent = '✅ Payment confirmed. Connecting...';
        elTimer.textContent = '';

        var loginUrl = 'http://' + dns + '/login?username=' +
            encodeURIComponent(voucher) + '&password=' + encodeURIComponent(voucher);

        // Show voucher as fallback
        elVoucherCode.textContent = voucher;
        elVoucherBox.style.display = 'block';
        elBtnConnect.href = loginUrl;
        elBtnConnect.style.display = 'block';

        // Auto DNS redirect after 1.5s
        setTimeout(function () {
            window.location.href = loginUrl;
        }, 1500);
    }

    function showFailed(message) {
        done = true;
        clearInterval(timerInterval);
        clearTimeout(pollTimer);

        elSpinnerWrap.style.display = 'none';
        elFailedRing.style.display = 'flex';
        elDots.style.display = 'none';
        elTitle.textContent = 'Payment Failed';
        elSubtitle.textContent = message || 'Your payment could not be completed. Please try again.';
        elStatusText.className = 'status-text failed';
        elStatusText.textContent = '❌ Payment failed.';
        elTimer.textContent = '';
        elBtnRetry.style.display = 'block';
    }

    function showTimeout() {
        done = true;
        elSpinnerWrap.style.display = 'none';
        elFailedRing.style.display = 'flex';
        elDots.style.display = 'none';
        elTitle.textContent = 'Taking Too Long';
        elSubtitle.textContent = 'We could not confirm your payment. Check your phone for the MTN/Airtel confirmation SMS.';
        elStatusText.className = 'status-text failed';
        elStatusText.textContent = '⏰ Timed out. Check your SMS.';
        elTimer.textContent = '';
        elBtnRetry.style.display = 'block';
    }

    function poll() {
        if (done) return;

        var xhr = new XMLHttpRequest();
        xhr.open('GET', STATUS_URL + '?t=' + Date.now(), true);
        xhr.timeout = 8000;
        xhr.onreadystatechange = function () {
            if (xhr.readyState !== 4) return;
            try {
                var data = JSON.parse(xhr.responseText || '{}');
                var status = (data.status || '').toUpperCase();

                if (status === 'SUCCESS') {
                    var voucher = data.voucher || '';
                    var dns     = data.hotspot_dns || 'hot.spot';
                    if (voucher) {
                        showSuccess(voucher, dns);
                    } else {
                        // Payment success but no voucher yet — retry once
                        pollTimer = setTimeout(poll, 1500);
                    }
                    return;
                }

                if (status === 'FAILED' || status === 'CANCELLED') {
                    showFailed(data.message || '');
                    return;
                }

                // Still PENDING — keep polling
                pollTimer = setTimeout(poll, POLL_INTERVAL);

            } catch (e) {
                pollTimer = setTimeout(poll, POLL_INTERVAL);
            }
        };
        xhr.ontimeout = function () {
            pollTimer = setTimeout(poll, POLL_INTERVAL);
        };
        xhr.onerror = function () {
            pollTimer = setTimeout(poll, POLL_INTERVAL);
        };
        xhr.send();
    }

    // Start polling
    poll();
</script>

</body>
</html>
