name: Deploy SpotPay

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/SpotPay-deployment
            git pull origin main

            # Always refresh SSL certs from Let's Encrypt before starting
            if [ -f /etc/letsencrypt/live/spotpay.it.com/fullchain.pem ]; then
              mkdir -p ssl
              cp /etc/letsencrypt/live/spotpay.it.com/fullchain.pem ssl/fullchain.pem
              cp /etc/letsencrypt/live/spotpay.it.com/privkey.pem ssl/privkey.pem
              echo "SSL certs refreshed from Let's Encrypt"
            else
              echo "WARNING: Let's Encrypt certs not found — obtaining new cert..."
              docker compose down || true
              certbot certonly --standalone -d spotpay.it.com -d www.spotpay.it.com \
                --non-interactive --agree-tos --email support@spotpay.it.com
              mkdir -p ssl
              cp /etc/letsencrypt/live/spotpay.it.com/fullchain.pem ssl/fullchain.pem
              cp /etc/letsencrypt/live/spotpay.it.com/privkey.pem ssl/privkey.pem
            fi

            # Verify key is valid (must be > 500 bytes)
            KEY_SIZE=$(wc -c < ssl/privkey.pem)
            if [ "$KEY_SIZE" -lt 500 ]; then
              echo "ERROR: privkey.pem is too small ($KEY_SIZE bytes) — cert is corrupted. Aborting!"
              exit 1
            fi
            echo "SSL key size: $KEY_SIZE bytes — OK"

            docker compose down
            docker compose up -d --build
