name: Deploy SpotPay

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/SpotPay-deployment
            git pull origin main

            # Always refresh SSL certs from Let's Encrypt before starting
            if [ -f /etc/letsencrypt/live/spotpay.it.com/fullchain.pem ]; then
              mkdir -p ssl
              cp /etc/letsencrypt/live/spotpay.it.com/fullchain.pem ssl/fullchain.pem
              cp /etc/letsencrypt/live/spotpay.it.com/privkey.pem ssl/privkey.pem
              echo "SSL certs refreshed from Let's Encrypt"
            else
              echo "WARNING: Let's Encrypt certs not found — obtaining new cert..."
              docker compose down || true
              certbot certonly --standalone -d spotpay.it.com -d www.spotpay.it.com \
                --non-interactive --agree-tos --email support@spotpay.it.com
              mkdir -p ssl
              cp /etc/letsencrypt/live/spotpay.it.com/fullchain.pem ssl/fullchain.pem
              cp /etc/letsencrypt/live/spotpay.it.com/privkey.pem ssl/privkey.pem
            fi

            # Verify key is valid (must contain PRIVATE KEY header)
            if ! grep -q 'PRIVATE KEY' ssl/privkey.pem; then
              echo "ERROR: privkey.pem does not contain a valid private key. Aborting!"
              exit 1
            fi
            echo "SSL key valid — OK"

            docker compose down --remove-orphans --volumes || true
            docker rm -f spotpay-deployment-redis-1 spotpay-deployment-web-1 spotpay-deployment-scheduler-1 spotpay-deployment-nginx-1 2>/dev/null || true
            docker rmi spotpay-deployment-scheduler spotpay-deployment-web || true
            docker compose up -d --build
