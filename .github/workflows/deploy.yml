name: Deploy SpotPay to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH (Zero Downtime)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            echo "Going to project folder..."
            cd /root/SpotPay-deployment

            echo "Pulling latest code..."
            git fetch --all
            git reset --hard origin/main

            echo "Creating .env file from secrets..."
            cat > .env << 'EOF'
            ${{ secrets.ENV_FILE }}
            EOF

            echo "Validating environment variables..."
            if ! grep -q 'DATABASE_URL=' .env; then
              echo "❌ DATABASE_URL missing in .env. Aborting deploy!"
              exit 1
            fi
            if ! grep -q 'SECRET_KEY=' .env; then
              echo "❌ SECRET_KEY missing in .env. Aborting deploy!"
              exit 1
            fi

            echo "Checking SSL certificate status..."
            if [ ! -f /etc/letsencrypt/live/spotpay.it.com/fullchain.pem ]; then
              echo "⚠️  SSL certificate not found. Installing Let's Encrypt certificate..."
              
              # Stop all containers to free port 80
              echo "Stopping all containers to free port 80..."
              docker compose down || true
              
              # Kill any process using port 80
              echo "Checking for processes on port 80..."
              lsof -ti:80 | xargs kill -9 2>/dev/null || true
              fuser -k 80/tcp 2>/dev/null || true
              
              # Wait for port to be free
              sleep 3
              
              # Install certbot if not present
              if ! command -v certbot &> /dev/null; then
                echo "Installing certbot..."
                apt-get update -qq
                apt-get install -y certbot python3-certbot-nginx
              fi
              
              # Obtain SSL certificate
              echo "Obtaining SSL certificate for spotpay.it.com..."
              certbot certonly --standalone \
                -d spotpay.it.com \
                -d www.spotpay.it.com \
                --non-interactive \
                --agree-tos \
                --email support@spotpay.it.com \
                --preferred-challenges http
              
              if [ $? -eq 0 ]; then
                echo "✅ SSL certificate obtained successfully"
                
                # Enable HTTPS in nginx.conf
                echo "Enabling HTTPS configuration..."
                sed -i 's/# return 301 https/return 301 https/g' nginx.conf
                sed -i 's/^# server {/server {/g' nginx.conf
                sed -i 's/^#     /    /g' nginx.conf
                sed -i 's/^# }/}/g' nginx.conf
                
                # Setup auto-renewal cron job
                echo "Setting up SSL auto-renewal..."
                (crontab -l 2>/dev/null | grep -v certbot; echo "0 0,12 * * * certbot renew --quiet --post-hook 'cd /root/SpotPay-deployment && docker compose restart nginx'") | crontab -
                
                echo "✅ HTTPS enabled and auto-renewal configured"
              else
                echo "⚠️  SSL certificate installation failed. Continuing with HTTP only."
              fi
            else
              echo "✅ SSL certificate already exists"
            fi

            echo "Building new containers (no downtime)..."
            docker compose build

            echo "Running migrations and static collection in a temp container..."
            docker compose run --rm web python manage.py migrate --noinput
            docker compose run --rm web python manage.py collectstatic --noinput

            echo "Health checking new image..."
            docker compose up -d --no-deps --build web
            echo "Waiting for gunicorn to be ready..."
            for i in $(seq 1 15); do
              if docker compose logs web | grep -q 'Booting worker'; then
                echo "✅ Gunicorn is up."
                break
              fi
              echo "Attempt $i/15 - waiting 3s..."
              sleep 3
            done
            if ! docker compose logs web | grep -q 'Booting worker'; then
              echo "❌ Health check failed. Not restarting nginx. Aborting!"
              docker compose logs web
              exit 1
            fi

            echo "Reloading nginx (zero downtime)..."
            docker compose up -d --no-deps nginx

            echo "Pruning old containers..."
            docker system prune -af --volumes

            echo "Checking container status..."
            docker compose ps

            echo "Deploy complete ✅"