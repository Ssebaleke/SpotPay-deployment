name: Setup LivePay Provider

on:
  workflow_dispatch:

jobs:
  setup-livepay:
    runs-on: ubuntu-latest
    
    steps:
    - name: Setup LivePay on server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 68.168.222.37
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /root/SpotPay-deployment
          git pull
          echo "=== SETTING UP LIVEPAY PROVIDER ==="
          docker compose exec web python3 manage.py shell -c "exec(open('setup_livepay.py').read())"
          
          echo -e "\n=== TESTING LIVEPAY AFTER SETUP ==="
          docker compose exec web python3 manage.py test_livepay_creds