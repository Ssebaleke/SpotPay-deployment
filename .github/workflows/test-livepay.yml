name: Test LivePay Credentials

on:
  workflow_dispatch:

jobs:
  test-livepay:
    runs-on: ubuntu-latest
    
    steps:
    - name: Test LivePay on server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 68.168.222.37
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /root/SpotPay-deployment
          git pull
          echo "=== TESTING LIVEPAY CREDENTIALS ==="
          docker compose exec web python3 manage.py shell -c "exec(open('test_livepay_real.py').read())"