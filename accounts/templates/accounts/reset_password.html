<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotPay - Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }
        .card {
            background: #161d27;
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.4);
        }
        .logo-icon {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; color: #fff;
            margin-bottom: 24px;
        }
        h2 { color: #f1f5f9; font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
        .sub { color: #64748b; font-size: .85rem; margin-bottom: 28px; }
        .form-label { color: #94a3b8; font-size: .82rem; margin-bottom: 6px; }
        .form-control {
            background: #0c1218;
            border: 1px solid #2d3748;
            color: #f1f5f9;
            border-radius: 0 10px 10px 0;
            padding: 11px 14px;
            font-size: .9rem;
            border-left: none;
        }
        .form-control:focus {
            background: #0c1218;
            border-color: #4361ee;
            color: #f1f5f9;
            box-shadow: 0 0 0 3px rgba(67,97,238,0.2);
        }
        .form-control::placeholder { color: #475569; }
        .input-group-text {
            background: #0c1218;
            border: 1px solid #2d3748;
            color: #64748b;
            border-radius: 10px 0 0 10px;
        }
        .input-group:focus-within .input-group-text { border-color: #4361ee; }
        .pw-toggle {
            background: #0c1218;
            border: 1px solid #2d3748;
            border-left: none;
            color: #64748b;
            border-radius: 0 10px 10px 0;
            cursor: pointer;
            padding: 0 14px;
        }
        .pw-toggle:hover { color: #94a3b8; }
        .btn-submit {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            border: none; color: #fff;
            border-radius: 10px; padding: 12px;
            font-size: .95rem; font-weight: 600;
            width: 100%; margin-top: 8px;
            transition: opacity .2s;
        }
        .btn-submit:hover { opacity: .88; color: #fff; }
        .divider { border-color: #2d3748; margin: 22px 0; }
        .back-link { color: #64748b; font-size: .83rem; text-align: center; }
        .back-link a { color: #4361ee; text-decoration: none; font-weight: 600; }
        .back-link a:hover { color: #7b9eff; }
        .alert { border-radius: 10px; font-size: .85rem; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo-icon"><i class="bi bi-wifi"></i></div>
    <h2>Set New Password</h2>
    <p class="sub">Enter and confirm your new password</p>

    {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags|default:'danger' }} alert-dismissible fade show mb-3" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">New Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" name="password" id="pw1" placeholder="Min. 8 characters" required>
                <button type="button" class="pw-toggle" onclick="togglePw('pw1','icon1')"><i class="bi bi-eye" id="icon1"></i></button>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                <input type="password" class="form-control" name="confirm" id="pw2" placeholder="Repeat password" required>
                <button type="button" class="pw-toggle" onclick="togglePw('pw2','icon2')"><i class="bi bi-eye" id="icon2"></i></button>
            </div>
        </div>
        <button type="submit" class="btn btn-submit">
            <i class="bi bi-check-circle me-2"></i>Reset Password
        </button>
    </form>

    <hr class="divider">
    <p class="back-link"><a href="{% url 'vendor_login' %}"><i class="bi bi-arrow-left me-1"></i>Back to Login</a></p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePw(fieldId, iconId) {
    const f = document.getElementById(fieldId);
    const i = document.getElementById(iconId);
    if (f.type === 'password') { f.type = 'text'; i.className = 'bi bi-eye-slash'; }
    else { f.type = 'password'; i.className = 'bi bi-eye'; }
}
</script>
</body>
</html>
