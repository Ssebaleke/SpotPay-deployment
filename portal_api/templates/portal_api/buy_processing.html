<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Processing Payment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 40px; background: #f5f5f5; }
        .card { background: #fff; border-radius: 10px; padding: 32px; max-width: 360px; margin: 0 auto; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        .spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 16px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status { font-size: 14px; color: #555; margin-top: 12px; }
        .error { color: #dc2626; }
    </style>
</head>
<body>
<div class="card">
    <h3>Processing Payment</h3>
    <p>
        Package: <strong>{{ package.name }}</strong><br>
        Amount: <strong>UGX {{ package.price }}</strong><br>
        Phone: <strong>{{ phone }}</strong>
    </p>
    <div class="spinner" id="spinner"></div>
    <p class="status" id="status-msg">Waiting for payment approval on your phone...</p>
</div>

<script>
    const statusUrl = "/payments/status/{{ payment.payment_uuid }}/";
    const successUrl = "/payments/success/{{ payment.payment_uuid }}/";
    let attempts = 0;
    const maxAttempts = 60; // 2 minutes at 2s intervals

    function poll() {
        fetch(statusUrl)
            .then(r => r.json())
            .then(data => {
                if (data.status === "SUCCESS") {
                    document.getElementById("status-msg").textContent = "Payment confirmed! Connecting you...";
                    document.getElementById("spinner").style.borderTopColor = "#16a34a";
                    // redirect to auto-login URL
                    setTimeout(() => { window.location.href = successUrl; }, 800);
                } else if (data.status === "FAILED" || data.status === "CANCELLED") {
                    document.getElementById("spinner").style.display = "none";
                    document.getElementById("status-msg").innerHTML =
                        '<span class="error">Payment failed or was cancelled.<br><a href="javascript:history.back()">Try again</a></span>';
                } else {
                    attempts++;
                    if (attempts >= maxAttempts) {
                        document.getElementById("spinner").style.display = "none";
                        document.getElementById("status-msg").innerHTML =
                            '<span class="error">Timed out waiting for payment.<br><a href="javascript:history.back()">Try again</a></span>';
                        return;
                    }
                    setTimeout(poll, 2000);
                }
            })
            .catch(() => {
                attempts++;
                if (attempts < maxAttempts) setTimeout(poll, 3000);
            });
    }

    setTimeout(poll, 3000); // first check after 3s
</script>
</body>
</html>
